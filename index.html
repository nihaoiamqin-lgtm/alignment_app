<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Alignment Explorer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            line-height: 1.5;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { margin-top: 0; color: #111827; }
        p.description { color: #4b5563; margin-bottom: 2rem; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.875rem; }
        input[type="text"], input[type="number"] {
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 1rem;
        }
        .radio-group { grid-column: span 2; display: flex; gap: 1.5rem; margin-bottom: 1rem; }
        .radio-group label { font-weight: normal; font-size: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background-color: #1d4ed8; }
        .output {
            margin-top: 2rem;
            background-color: #1f2937;
            color: #f3f4f6;
            padding: 1.5rem;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            font-size: 1.125rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sequence Alignment Explorer</h1>
        <p class="description">Explore how scoring choices change global and local alignments.</p>

        <div class="radio-group">
            <label><input type="radio" name="algorithm" value="local" checked> Local Alignment</label>
            <label><input type="radio" name="algorithm" value="global"> Global Alignment</label>
        </div>

        <div class="grid">
            <div class="form-group" style="grid-column: span 2;">
                <label>Sequence 1</label>
                <input type="text" id="seq1" value="GATTACA">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Sequence 2</label>
                <input type="text" id="seq2" value="GCATGCU">
            </div>
            <div class="form-group">
                <label>Match Score</label>
                <input type="number" id="match" value="1" step="0.1">
            </div>
            <div class="form-group"></div>
            <div class="form-group">
                <label>Mismatch Penalty (Positive Number)</label>
                <input type="number" id="mismatch" value="1" step="0.1">
            </div>
            <div class="form-group">
                <label>Gap Penalty (Positive Number)</label>
                <input type="number" id="gap" value="1" step="0.1">
            </div>
        </div>

        <button onclick="runAlignment()">Run Alignment</button>

        <div id="output" class="output">Awaiting input...</div>
    </div>

    <script>
        function localAlignment(s1, s2, match, mismatch, gap) {
            let rows = s1.length + 1;
            let cols = s2.length + 1;
            let matrix = Array(rows).fill().map(() => Array(cols).fill(0.0));
            let maxScore = -1.0;
            let maxI = 0, maxJ = 0;

            for(let i=1; i<rows; i++) {
                for(let j=1; j<cols; j++) {
                    let diag = matrix[i-1][j-1] + (s1[i-1] === s2[j-1] ? match : -mismatch);
                    let up = matrix[i-1][j] - gap;
                    let left = matrix[i][j-1] - gap;
                    matrix[i][j] = Math.max(0, diag, up, left);
                    
                    if(matrix[i][j] > maxScore) {
                        maxScore = matrix[i][j];
                        maxI = i; maxJ = j;
                    }
                }
            }

            let i = maxI, j = maxJ;
            let align1 = "", align2 = "";
            
            while(matrix[i][j] > 0) {
                let current = matrix[i][j];
                let left = matrix[i][j-1] - gap;
                let up = matrix[i-1][j] - gap;

                if (Math.abs(current - left) < 0.0001) {
                    align1 = "-" + align1;
                    align2 = s2[j-1] + align2;
                    j--;
                } else if (Math.abs(current - up) < 0.0001) {
                    align1 = s1[i-1] + align1;
                    align2 = "-" + align2;
                    i--;
                } else {
                    align1 = s1[i-1] + align1;
                    align2 = s2[j-1] + align2;
                    i--; j--;
                }
            }
            return `Score: ${maxScore}\n\n${align1}\n${align2}`;
        }

        function globalAlignment(s1, s2, match, mismatch, gap) {
            let rows = s1.length + 1;
            let cols = s2.length + 1;
            let matrix = Array(rows).fill().map(() => Array(cols).fill(0.0));

            for(let i=1; i<rows; i++) matrix[i][0] = matrix[i-1][0] - gap;
            for(let j=1; j<cols; j++) matrix[0][j] = matrix[0][j-1] - gap;

            for(let i=1; i<rows; i++) {
                for(let j=1; j<cols; j++) {
                    let diag = matrix[i-1][j-1] + (s1[i-1] === s2[j-1] ? match : -mismatch);
                    let up = matrix[i-1][j] - gap;
                    let left = matrix[i][j-1] - gap;
                    matrix[i][j] = Math.max(diag, up, left);
                }
            }

            let i = rows - 1, j = cols - 1;
            let align1 = "", align2 = "";
            let finalScore = matrix[i][j];

            while(i > 0 || j > 0) {
                let current = matrix[i][j];
                let isMatch = i > 0 && j > 0 && s1[i-1] === s2[j-1];
                let diagScore = i > 0 && j > 0 ? matrix[i-1][j-1] + (isMatch ? match : -mismatch) : null;
                
                if (i > 0 && j > 0 && Math.abs(current - diagScore) < 0.0001) {
                    align1 = s1[i-1] + align1;
                    align2 = s2[j-1] + align2;
                    i--; j--;
                } else if (i > 0 && Math.abs(current - (matrix[i-1][j] - gap)) < 0.0001) {
                    align1 = s1[i-1] + align1;
                    align2 = "-" + align2;
                    i--;
                } else {
                    align1 = "-" + align1;
                    align2 = s2[j-1] + align2;
                    j--;
                }
            }
            return `Score: ${finalScore}\n\n${align1}\n${align2}`;
        }

        function runAlignment() {
            let algo = document.querySelector('input[name="algorithm"]:checked').value;
            let s1 = document.getElementById('seq1').value.toUpperCase();
            let s2 = document.getElementById('seq2').value.toUpperCase();
            let match = parseFloat(document.getElementById('match').value);
            let mismatch = parseFloat(document.getElementById('mismatch').value);
            let gap = parseFloat(document.getElementById('gap').value);

            let result = "";
            if(algo === 'local') {
                result = localAlignment(s1, s2, match, mismatch, gap);
            } else {
                result = globalAlignment(s1, s2, match, mismatch, gap);
            }

            document.getElementById('output').textContent = result;
        }
    </script>
</body>
</html>
